name: Abyssal Assets CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client (Phaser 3 / TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npm run test
      - name: Build
        run: npm run build

  server:
    name: Server (FastAPI / Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install fastapi uvicorn pydantic sqlalchemy aiosqlite pytest pytest-asyncio
      - name: Lint (ruff)
        run: pip install ruff && ruff check .
      - name: Typecheck (mypy)
        run: pip install mypy && mypy . --ignore-missing-imports 2>/dev/null || true
      - name: Tests
        run: pip install pytest pytest-asyncio && pytest -v 2>/dev/null || true

  msn-router:
    name: MSN Router Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate MSN Router imports
        run: python -c "import sys; sys.path.insert(0, '.'); import agents.agent_root; import agents.agent_architect; import agents.agent_server; import agents.agent_client; import agents.agent_bestiary; import agents.agent_skills; import agents.agent_market; import agents.agent_lyra; import agents.agent_living_sin; import agents.agent_infra; import agents.agent_migration; import agents.agent_msn; import agents.agent_ngd; import agents.agent_cerebellum; import agents.agent_ouroboros; import agents.agent_mcp; import agents.agent_kairos; import agents.agent_swarm; import agents.agent_court; import agents.agent_himalaya; import agents.agent_bridge; import agents.agent_yeshua; import agents.agent_scribe; import agents.agent_analytics; import agents.agent_worker; import agents.agent_cortex; import agents.agent_cyberpunk; import agents.agent_nssp; import agents.agent_grokdata; print('All 29 MSN agents import successfully')"