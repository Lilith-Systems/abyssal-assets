<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Abyssal Assets - Cryptid Hat Trading Simulator" />
    <meta name="theme-color" content="#0d0e15" />
    <title>Abyssal Assets | The Loch Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #050508; overflow: hidden; font-family: 'Outfit', sans-serif; }
      #game-container { width: 100vw; height: 100vh; display: block; position: relative; z-index: 10; }
      canvas { display: block; }
      
      /* Animated Background */
      .bg-animation {
        position: fixed;
        top: -50%; left: -50%; width: 200%; height: 200%;
        background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 50%),
                    radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, rgba(0, 0, 0, 0) 40%);
        animation: slowSpin 30s linear infinite;
        z-index: 0;
      }

      @keyframes slowSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      #loading {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at center, #13111c 0%, #050508 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #f8fafc;
      }
      #loading.hidden { 
        opacity: 0; 
        pointer-events: none; 
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
      }
      
      /* Glassmorphic Container */
      .loader-card {
        background: rgba(30, 41, 59, 0.25);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 4rem;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        transform: translateY(0);
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      .lake-title { 
        font-size: 3.5rem; 
        font-weight: 900; 
        letter-spacing: -0.02em; 
        margin-bottom: 0.5rem; 
        background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
      }

      .lake-subtitle { 
        font-family: 'JetBrains Mono', monospace; 
        font-size: 0.9rem; 
        font-weight: 400;
        color: #94a3b8;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 3rem; 
      }

      /* Premium Progress Bar */
      .progress-wrapper {
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
      }
      
      .progress-bar { 
        width: 100%; 
        height: 6px; 
        background: rgba(15, 23, 42, 0.6); 
        border-radius: 999px;
        overflow: hidden; 
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
      }
      
      .progress-fill { 
        height: 100%; 
        background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); 
        background-size: 200% 200%;
        width: 0%; 
        border-radius: 999px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        animation: gradientFlow 3s ease infinite;
        box-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
      }

      @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      #loading-status {
        margin-top: 1.5rem;
        margin-bottom: 0;
        font-size: 0.75rem;
        color: #64748b;
        animation: pulseText 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulseText {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div class="bg-animation"></div>
    <div id="loading" role="status" aria-live="polite">
      <div class="loader-card">
        <div class="lake-title">ABYSSAL ASSETS</div>
        <div class="lake-subtitle">The Loch Exchange</div>
        <div class="progress-wrapper">
          <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="lake-subtitle" id="loading-status">Synchronizing Depths...</div>
        </div>
      </div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
