<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60">
  <defs>
    <linearGradient id="crimsonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="violetGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <filter id="badgeGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur">
        <animate attributeName="stdDeviation" values="1;3;1" dur="2s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="320" height="60" rx="8" fill="#0f172a" />
  <rect width="320" height="60" rx="8" fill="url(#crimsonGradient)" opacity="0.1" />
  
  <!-- Left Label -->
  <rect x="0" y="0" width="110" height="60" rx="8" fill="url(#crimsonGradient)" filter="url(#badgeGlow)" />
  <text x="55" y="37" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
        font-size="13" font-weight="700" fill="#fef2f2">ABYSSAL ASSETS</text>
  
  <!-- Right Status -->
  <rect x="110" y="2" width="208" height="56" rx="6" fill="#1e1b4b" />
  
  <!-- Animated Status Badges -->
  <g font-family="'JetBrains Mono', monospace" fill="#94a3b8">
    <text x="120" y="22" font-size="10">PHASER 3</text>
    <text x="200" y="22" font-size="10" fill="#22d3ee">TS CLIENT</text>
    <text x="120" y="42" font-size="10" fill="#a855f7">CLOB</text>
    <text x="180" y="42" font-size="10" fill="#06b6d4">DREDGE</text>
    <text x="240" y="42" font-size="10" fill="url(#violetGradient)">LILITH</text>
  </g>
  
  <!-- Pulsing Indicator -->
  <circle cx="290" cy="30" r="4" fill="#dc2626" filter="url(#badgeGlow)">
    <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite" />
  </circle>
</svg>