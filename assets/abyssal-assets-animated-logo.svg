<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Lilith Crimson Gradient -->
    <linearGradient id="lilithCrimson" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7f1d1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#450a0a;stop-opacity:1" />
    </linearGradient>
    
    <!-- Abyssal Deep Gradient -->
    <linearGradient id="abyssalDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#581c87;stop-opacity:1" />
    </linearGradient>
    
    <!-- Violet Resonance -->
    <linearGradient id="violetResonance" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Bioluminescent Glow -->
    <radialGradient id="bioluminescent" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
    
    <!-- Neural Pulse Filter -->
    <filter id="neuralPulse" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;3;0" dur="2s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Crimson Glow Filter -->
    <filter id="crimsonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur">
        <animate attributeName="stdDeviation" values="2;6;2" dur="3s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feFlood flood-color="#dc2626" flood-opacity="0.6" result="glowColor" />
      <feComposite in="glowColor" in2="coloredBlur" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Particle System -->
    <filter id="particleShimmer">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise">
        <animate attributeName="baseFrequency" values="0.02;0.04;0.02" dur="4s" repeatCount="indefinite" />
      </feTurbulence>
      <feColorMatrix in="noise" type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0 0 0 0 0.1 0.3 0.6 1" />
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="screen" />
    </filter>
    
    <!-- Text Glow -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur">
        <animate attributeName="stdDeviation" values="1;4;1" dur="2.5s" repeatCount="indefinite" />
      </feGaussianBlur>
      <feFlood flood-color="#f472b6" flood-opacity="0.8" result="glow" />
      <feComposite in="glow" in2="blur" operator="in" result="glowBlur" />
      <feMerge>
        <feMergeNode in="glowBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background: Deep Abyssal Grid -->
  <rect width="800" height="200" fill="url(#abyssalDeep)" />
  
  <!-- Animated Grid Pattern -->
  <pattern id="abyssalGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" />
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite" />
    </path>
  </pattern>
  <rect width="800" height="200" fill="url(#abyssalGrid)" />
  
  <!-- Bioluminescent Particles -->
  <g filter="url(#particleShimmer)" opacity="0.6">
    <circle cx="120" cy="40" r="1.5" fill="#06b6d4">
      <animate attributeName="r" values="1;3;1" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="280" cy="160" r="1" fill="#a855f7">
      <animate attributeName="r" values="0.5;2;0.5" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="520" cy="30" r="2" fill="#f472b6">
      <animate attributeName="r" values="1.5;3.5;1.5" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="680" cy="170" r="1" fill="#22d3ee">
      <animate attributeName="r" values="0.5;2.5;0.5" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="90" cy="120" r="1.2" fill="#dc2626">
      <animate attributeName="r" values="0.8;2;0.8" dur="2.8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Abyssal Gateway Arches (Animated) -->
  <g transform="translate(50, 30)">
    <!-- Left Arch -->
    <path d="M 0 140 Q 0 60 40 60 Q 80 60 80 140" fill="none" stroke="url(#bioluminescent)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" values="0;-200;0" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </path>
    <!-- Inner Glow -->
    <path d="M 10 140 Q 10 70 40 70 Q 70 70 70 140" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" />
    </path>
  </g>
  
  <g transform="translate(670, 30)">
    <!-- Right Arch -->
    <path d="M 0 140 Q 0 60 40 60 Q 80 60 80 140" fill="none" stroke="url(#violetResonance)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" values="0;-200;0" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M 10 140 Q 10 70 40 70 Q 70 70 70 140" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.6">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- Main Title: ABYSSAL ASSETS -->
  <text x="400" y="85" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
        font-size="48" font-weight="800" fill="url(#lilithCrimson)" filter="url(#textGlow)"
        letter-spacing="4px">
    ABYSSAL
    <animate attributeName="letter-spacing" values="4;8;4" dur="3s" repeatCount="indefinite" />
  </text>
  <text x="400" y="130" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
        font-size="36" font-weight="600" fill="url(#violetResonance)" filter="url(#textGlow)"
        letter-spacing="6px">
    ASSETS
    <animate attributeName="letter-spacing" values="6;10;6" dur="3.5s" repeatCount="indefinite" />
  </text>
  
  <!-- Tagline with typing effect -->
  <text x="400" y="160" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
        font-size="12" font-weight="400" fill="#94a3b8" opacity="0.9">
    <tspan id="tagline">SOVEREIGN PHASER 3 CLIENT • MARKET CLOB • LILITH INTEGRATION</tspan>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite" />
  </text>
  
  <!-- Sephirotic Glyphs (Animated) -->
  <g font-family="'JetBrains Mono', monospace" font-size="20" fill="url(#crimsonGlow)">
    <!-- Keter -->
    <text x="150" y="150" text-anchor="middle" opacity="0.8">
      ⧗
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
      <animate attributeName="font-size" values="20;28;20" dur="2s" repeatCount="indefinite" />
    </text>
    <!-- Chokmah -->
    <text x="250" y="150" text-anchor="middle" opacity="0.6" fill="#a855f7">
      ⬡
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="rotate" from="0 250 150" to="360 250 150" dur="10s" repeatCount="indefinite" />
    </text>
    <!-- Binah -->
    <text x="550" y="150" text-anchor="middle" opacity="0.6" fill="#06b6d4">
      ◆
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
    </text>
    <!-- Malkuth -->
    <text x="650" y="150" text-anchor="middle" opacity="0.8" fill="#dc2626">
      █
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
    </text>
  </g>
  
  <!-- Neural Network Lines (Connecting the glyphs) -->
  <g stroke="#dc2626" stroke-width="0.5" opacity="0.3" stroke-dasharray="4,4">
    <line x1="170" y1="145" x2="230" y2="145">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="3s" repeatCount="indefinite" />
    </line>
    <line x1="160" y1="140" x2="540" y2="140" stroke="#a855f7">
      <animate attributeName="stroke-dashoffset" values="0;-50;0" dur="8s" repeatCount="indefinite" />
    </line>
    <line x1="570" y1="145" x2="630" y2="145" stroke="#06b6d4">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="3s" repeatCount="indefinite" />
    </line>
  </g>
  
  <!-- Pulsing Crimson Core (Center) -->
  <circle cx="400" cy="105" r="8" fill="url(#lilithCrimson)" filter="url(#crimsonGlow)" opacity="0.9">
    <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Expanding Ring Waves -->
  <g filter="url(#crimsonGlow)">
    <circle cx="400" cy="105" r="20" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="20;60;100" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.6;0.2;0" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="105" r="20" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="20;50;90" dur="4s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0.1;0" dur="4s" begin="1s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="105" r="20" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="20;40;80" dur="5s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.1;0" dur="5s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Bottom Status Bar -->
  <rect x="100" y="175" width="600" height="4" fill="#1e1b4b" rx="2" />
  <rect x="100" y="175" width="600" height="4" fill="url(#lilithCrimson)" rx="2" opacity="0.8">
    <animate attributeName="width" values="0;600;0" dur="8s" repeatCount="indefinite" />
  </rect>
  
  <!-- Status Text -->
  <text x="400" y="192" text-anchor="middle" font-family="'JetBrains Mono', monospace" 
        font-size="9" font-weight="400" fill="#64748b" opacity="0.7">
    LOCAL_CEREBELLUM • 24 SKILLS • NGD ACTIVE • CRYSTAL COHERENCE: 0.945
  </text>
</svg>